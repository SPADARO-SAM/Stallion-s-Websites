<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 208">
  <!-- Background card -->
  <rect x="2" y="2" width="516" height="204" rx="16" fill="#0a0a0a"/>
  <rect x="2" y="2" width="516" height="204" rx="16" fill="none" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Diamond outer (white fill) -->
  <polygon points="104,14 194,104 104,194 14,104" fill="white"/>
  <!-- Diamond outer border -->
  <polygon points="104,14 194,104 104,194 14,104" fill="none" stroke="#0a0a0a" stroke-width="5"/>
  <!-- Diamond inner border ring -->
  <polygon points="104,26 182,104 104,182 26,104" fill="none" stroke="#0a0a0a" stroke-width="2.5"/>

  <!-- REARING HORSE (centered in diamond at 104,104) -->
  <g transform="translate(104,104)">
    <!-- Body barrel (large tilted ellipse) -->
    <ellipse cx="-4" cy="4" rx="22" ry="13" transform="rotate(-42)" fill="#111"/>

    <!-- Neck thick stroke connecting body to head -->
    <line x1="10" y1="-10" x2="22" y2="-30"
      stroke="#111" stroke-width="11" stroke-linecap="round"/>

    <!-- Head (oval) -->
    <ellipse cx="23" cy="-33" rx="9" ry="7"
      transform="rotate(-15,23,-33)" fill="#111"/>

    <!-- Muzzle bump -->
    <ellipse cx="30" cy="-27" rx="5" ry="4"
      transform="rotate(15,30,-27)" fill="#111"/>

    <!-- Mane (thick strokes along back of neck) -->
    <path d="M8,-12 C4,-18 5,-25 9,-30"
      stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M11,-9 C7,-15 8,-22 12,-27"
      stroke="#111" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Left hind leg (ground, outer) -->
    <path d="M-16,10 C-18,22 -17,34 -16,43"
      stroke="#111" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Left hind hoof -->
    <ellipse cx="-15" cy="44" rx="5" ry="3" fill="#111"/>

    <!-- Right hind leg (ground, slightly forward) -->
    <path d="M-7,13 C-7,25 -4,36 -2,44"
      stroke="#111" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- Right hind hoof -->
    <ellipse cx="-1" cy="45" rx="4.5" ry="2.5" fill="#111"/>

    <!-- Tail (flowing down-left from rump) -->
    <path d="M-24,6 C-30,12 -34,22 -30,32"
      stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M-24,8 C-28,16 -26,26 -22,32"
      stroke="#111" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Left front leg (raised, bent at knee — upper) -->
    <path d="M13,-5 C18,2 22,6 24,14"
      stroke="#111" stroke-width="5.5" fill="none" stroke-linecap="round"/>
    <!-- Left front lower leg (bent forward at knee) -->
    <path d="M24,14 C26,22 24,28 22,34"
      stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Right front leg (raised higher, extended) -->
    <path d="M17,-6 C24,0 30,4 34,12"
      stroke="#111" stroke-width="5" fill="none" stroke-linecap="round"/>
    <!-- Right front lower leg -->
    <path d="M34,12 C36,20 34,26 32,32"
      stroke="#111" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="218" y1="32" x2="218" y2="176" stroke="#505050" stroke-width="1.5"/>

  <!-- STALLION'S -->
  <text x="236" y="95"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="45" font-weight="900" fill="white" letter-spacing="-1">STALLION'S</text>

  <!-- SITES -->
  <text x="236" y="142"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="45" font-weight="900" fill="white" letter-spacing="-1">SITES</text>

  <!-- Rule under SITES -->
  <line x1="236" y1="150" x2="512" y2="150" stroke="white" stroke-width="1"/>

  <!-- Tagline -->
  <text x="236" y="165"
    font-family="Arial,Helvetica,sans-serif"
    font-size="11" fill="#cccccc" letter-spacing="4.5">WEBSITES BUILT TO RUN WILD</text>

  <!-- EST 2025 badge -->
  <rect x="236" y="172" width="102" height="23" rx="3"
    fill="none" stroke="white" stroke-width="1.5"/>
  <text x="287" y="188"
    font-family="Arial,Helvetica,sans-serif"
    font-size="11" font-weight="700" fill="white"
    text-anchor="middle" letter-spacing="2">EST. 2025</text>
</svg>
